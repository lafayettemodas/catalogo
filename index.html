<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<link rel="icon" type="image/png" href="img/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=20260715c">
</head>
<body>

<header class="site-header">
  <span class="eyebrow">Você merece estar linda todos os dias.</span>
  <img class="site-logo" src="img/logo.png" alt="Lafayette Moda Feminina">
  <div class="header-social">
    <a href="#" target="_blank" rel="noopener" id="instagramLink" class="instagram-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
        <line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line>
      </svg>
      <span id="instagramHandle"></span>
    </a>
    <a href="#" target="_blank" rel="noopener" id="addressLink" class="address-link"></a>
    <a href="#" id="phoneLink" class="phone-link" target="_blank" rel="noopener"></a>
  </div>
  <h1 id="storeName" class="sr-only">Minha Loja</h1>
  <p>Peças selecionadas com carinho. Toque em uma foto para ver detalhes e falar com a gente.</p>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Buscar por nome ou referência...">
  <select id="categoryFilter">
    <option value="">Todas as categorias</option>
  </select>
  <select id="sizeFilter">
    <option value="">Todos os tamanhos</option>
  </select>
  <select id="promoFilter">
    <option value="">Todos os produtos</option>
    <option value="promo">Somente promoções</option>
  </select>
</div>

<main class="grid" id="grid">
  <p class="empty-state">Carregando produtos...</p>
</main>

<footer class="site-footer">
  <span id="footerStoreName">Minha Loja</span> — catálogo online
</footer>

<!-- Modal de detalhes do produto -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="gallery">
      <img id="galleryImg" src="" alt="">
      <button class="gallery-nav prev" id="galleryPrev">‹</button>
      <button class="gallery-nav next" id="galleryNext">›</button>
      <div class="gallery-counter" id="galleryCounter"></div>
    </div>
    <div class="details">
      <button class="close-btn" id="closeModal">×</button>
      <h2 id="modalName"></h2>
      <div class="ref" id="modalRef"></div>
      <div class="price" id="modalPrice"></div>
      <div class="desc" id="modalDesc"></div>
      <div class="tag-row"><strong>Tamanhos:</strong> <div class="size-options" id="modalSizes"></div></div>
      <div class="tag-row"><strong>Cores:</strong> <span id="modalColors"></span></div>
      <a href="#" target="_blank" class="whatsapp-btn" id="whatsappBtn">Perguntar no WhatsApp</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js?v=20260715c"></script>
<script src="js/supabaseClient.js?v=20260715c"></script>
<script src="js/app.js?v=20260715c"></script>
</body>
</html>
