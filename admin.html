<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Catálogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header>
  <h1>Painel Admin</h1>
  <button class="secondary" id="logoutBtn" style="display:none;">Sair</button>
</header>

<!-- Tela de login -->
<div id="loginScreen">
  <h2>Entrar</h2>
  <div class="field">
    <label>E-mail</label>
    <input type="email" id="loginEmail" placeholder="voce@email.com">
  </div>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
  </div>
  <button class="primary" id="loginBtn">Entrar</button>
  <div class="error-msg" id="loginError"></div>
</div>

<!-- Área logada -->
<main id="adminArea">

  <div class="panel">
    <h2>Categorias</h2>
    <div class="inline-cat-add">
      <input type="text" id="newCategoryName" placeholder="Nome da nova categoria">
      <button class="secondary" id="addCategoryBtn">Adicionar</button>
    </div>
  </div>

  <div class="panel">
    <h2 id="formTitle">Novo produto</h2>
    <input type="hidden" id="productId">
    <div class="row">
      <div class="field">
        <label>Nome</label>
        <input type="text" id="fieldName">
      </div>
      <div class="field">
        <label>Preço (R$)</label>
        <input type="number" step="0.01" id="fieldPrice">
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="fieldCategory"></select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Tamanhos (separados por vírgula)</label>
        <input type="text" id="fieldSizes" placeholder="P, M, G">
      </div>
      <div class="field">
        <label>Cores (separadas por vírgula)</label>
        <input type="text" id="fieldColors" placeholder="Preto, Branco">
      </div>
    </div>
    <div class="field">
      <label>Descrição</label>
      <textarea id="fieldDescription"></textarea>
    </div>
    <div class="field">
      <label>Fotos (pode selecionar várias)</label>
      <input type="file" id="fieldImages" accept="image/*" multiple>
    </div>
    <button class="primary" id="saveProductBtn">Salvar produto</button>
    <button class="secondary" id="cancelEditBtn" style="display:none;">Cancelar edição</button>
    <div class="error-msg" id="formError"></div>
  </div>

  <div class="panel">
    <h2>Produtos cadastrados</h2>
    <table>
      <thead>
        <tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Categoria</th><th>Ações</th></tr>
      </thead>
      <tbody id="productsTableBody"></tbody>
    </table>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
